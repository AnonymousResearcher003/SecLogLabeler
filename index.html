<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecLogLabeler</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="layout">
      <section class="panel">
        <h1>SecLogLabeler</h1>
        <label for="logInput">Paste log text</label>
        <textarea id="logInput" placeholder="Example: Failed login for user admin from 10.0.0.2"></textarea>
        <div class="example-links" aria-label="Example logs">
          <a href="#" data-example="openssh">Try OpenSSH Failure Example</a>
          <a href="#" data-example="apache">Try Apache Access Leak Example</a>
        </div>
        <br />
        <button id="annotateBtn">Annotate</button>

        <div class="result">
          <h2>Generated Labels</h2>
          <div id="status" class="muted">No annotations yet.</div>
          <div id="labelsContainer"></div>
          <div class="export-actions" aria-label="Export annotation">
            <button id="exportJsonBtn" type="button" disabled>Export JSON</button>
            <button id="exportCsvBtn" type="button" disabled>Export CSV</button>
          </div>
        </div>
      </section>

      <aside class="panel">
        <h2>Security Attributes</h2>
        <div class="muted" id="vizInfo">Labels with value 1 are highlighted.</div>
        <div id="vizGrid" class="viz-grid" style="margin-top: 0.7rem"></div>
      </aside>
    </div>

    <script>
      const annotateBtn = document.getElementById("annotateBtn");
      const logInput = document.getElementById("logInput");
      const statusEl = document.getElementById("status");
      const labelsContainer = document.getElementById("labelsContainer");
      const vizGrid = document.getElementById("vizGrid");
      const exportJsonBtn = document.getElementById("exportJsonBtn");
      const exportCsvBtn = document.getElementById("exportCsvBtn");
      let latestAnnotation = null;
      const exampleLogs = {
        openssh: "Failed password for invalid user webmaster from 173.234.31.186 port 38926 ssh2",
        apache: "198.51.100.24 - - [19/Jun/2026:10:14:22 +0000] \"GET /exports/customer-records.csv HTTP/1.1\" 200 48392 \"-\" \"Mozilla/5.0\"",
      };

      document.querySelectorAll("[data-example]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          logInput.value = exampleLogs[link.dataset.example] || "";
          logInput.focus();
        });
      });

      const labelMeta = [
        { key: "C", title: "Confidentiality" },
        { key: "I", title: "Integrity" },
        { key: "N", title: "Non-repudiation" },
        { key: "Ac", title: "Accountability" },
        { key: "Au", title: "Authenticity" },
        { key: "R", title: "Resistance" },
      ];
      const labelTitles = {
        BINARY_SECURITY_LABEL: "Overall Security Flag",
        C: "Confidentiality Analysis",
        I: "Integrity Analysis",
        N: "Non-repudiation Analysis",
        Ac: "Accountability Analysis",
        Au: "Authenticity Analysis",
        R: "Resistance Analysis",
      };

      function renderLabels(labels) {
        labelsContainer.innerHTML = "";
        labels.forEach((item) => {
          const hasReason = item.value === 1 && item.reason;
          const card = document.createElement(hasReason ? "details" : "div");
          card.className = "label-card";
          if (item.label === "BINARY_SECURITY_LABEL") {
            card.classList.add("overall-security-flag", item.value === 1 ? "security-positive" : "security-negative");
          }
          const title = labelTitles[item.label] || item.label;
          const classification = `<span class="label-value"><strong>Model Annotation:</strong> ${item.value}</span>`;
          if (hasReason) {
            card.innerHTML = `
              <summary class="label-summary"><strong>${title}</strong>${classification}<span class="accordion-toggle" aria-hidden="true">+</span></summary>
              <p class="label-reason"><strong>Reasoning:</strong> ${item.reason}</p>
            `;
          } else {
            card.innerHTML = `<div class="label-summary"><strong>${title}</strong>${classification}<span class="accordion-toggle placeholder" aria-hidden="true">+</span></div>`;
          }
          labelsContainer.appendChild(card);
        });
      }

      function resolveBinaryLabel(data) {
        if (data && typeof data.binary_label !== "undefined" && data.binary_label !== null) {
          return data.binary_label;
        }
        const labels = (data && data.labels) || [];
        const binaryEntry = labels.find((item) => item.label === "BINARY_SECURITY_LABEL");
        if (binaryEntry && typeof binaryEntry.value !== "undefined" && binaryEntry.value !== null) {
          return binaryEntry.value;
        }
        return "N/A";
      }

      function resolveMultilabels(data) {
        if (data && data.multilabels && typeof data.multilabels === "object") {
          return data.multilabels;
        }
        const labels = (data && data.labels) || [];
        const out = {};
        labelMeta.forEach((meta) => {
          const found = labels.find((item) => item.label === meta.key);
          out[meta.key] = found && typeof found.value !== "undefined" ? Number(found.value) : 0;
        });
        return out;
      }

      function renderMultilabelVisualization(multilabels) {
        vizGrid.innerHTML = "";
        labelMeta.forEach((meta) => {
          const value = Number(multilabels?.[meta.key] || 0);
          const item = document.createElement("div");
          item.className = `viz-item ${value === 1 ? "active" : ""}`;
          item.innerHTML = `
            <div>
              <div class="name">${meta.key} (${meta.title})</div>
              <div class="desc">Model Annotation</div>
            </div>
            <div class="badge ${value === 1 ? "on" : ""}">${value}</div>
          `;
          vizGrid.appendChild(item);
        });
      }

      function buildExportRecord() {
        if (!latestAnnotation) return null;
        const multilabels = latestAnnotation.multilabels || {};
        const isoLabels = {};
        labelMeta.forEach((meta) => {
          isoLabels[meta.key] = Number(multilabels[meta.key] || 0);
        });
        return {
          log: latestAnnotation.log,
          overall_security_flag: Number(latestAnnotation.binary_label),
          iso_sub_characteristics: isoLabels,
          generated_reasoning: {
            overall_security: latestAnnotation.binary_reasoning || null,
            iso_sub_characteristics: latestAnnotation.multilabel_reasoning || null,
          },
          model_mode: latestAnnotation.mode || "unknown",
          exported_at: new Date().toISOString(),
        };
      }

      function downloadExport(content, fileName, mimeType) {
        const blob = new Blob([content], { type: `${mimeType};charset=utf-8` });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      function csvCell(value) {
        return `"${String(value ?? "").replaceAll('"', '""')}"`;
      }

      exportJsonBtn.addEventListener("click", () => {
        const record = buildExportRecord();
        if (!record) return;
        downloadExport(JSON.stringify(record, null, 2), "sec-log-annotation.json", "application/json");
      });

      exportCsvBtn.addEventListener("click", () => {
        const record = buildExportRecord();
        if (!record) return;
        const headers = [
          "log", "overall_security_flag", "C", "I", "N", "Ac", "Au", "R",
          "overall_security_reasoning", "iso_reasoning", "model_mode", "exported_at",
        ];
        const row = [
          record.log,
          record.overall_security_flag,
          ...labelMeta.map((meta) => record.iso_sub_characteristics[meta.key]),
          record.generated_reasoning.overall_security,
          record.generated_reasoning.iso_sub_characteristics,
          record.model_mode,
          record.exported_at,
        ];
        downloadExport(`${headers.map(csvCell).join(",")}\n${row.map(csvCell).join(",")}\n`, "sec-log-annotation.csv", "text/csv");
      });

      annotateBtn.addEventListener("click", async () => {
        const log = logInput.value.trim();
        if (!log) {
          statusEl.textContent = "Please enter a log before annotating.";
          labelsContainer.innerHTML = "";
          return;
        }

        statusEl.textContent = "Annotating...";
        labelsContainer.innerHTML = "";

        try {
          const response = await fetch("/annotate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ log }),
          });

          const responseText = await response.text();
          let data;
          try {
            data = JSON.parse(responseText);
          } catch {
            throw new Error(`Server returned HTTP ${response.status}.`);
          }

          if (!response.ok) {
            throw new Error(data.error || `Server returned HTTP ${response.status}.`);
          }
          latestAnnotation = { ...data, log };
          exportJsonBtn.disabled = false;
          exportCsvBtn.disabled = false;
          renderLabels(data.labels || []);
          const binaryValue = resolveBinaryLabel(data);
          const multilabels = resolveMultilabels(data);
          renderMultilabelVisualization(multilabels);
          const modeText = data.mode ? ` | mode: ${data.mode}` : "";
          statusEl.textContent = `Found ${(data.labels || []).length} label(s). Binary=${binaryValue}${modeText}`;
        } catch (error) {
          statusEl.textContent = `Annotation failed: ${error.message || "Could not reach the server."}`;
        }
      });

      renderMultilabelVisualization({});
    </script>
  </body>
</html>
